# Opción B: Ajustar un modelo preentrenado de Hugging Face (T5)

# =============================================================================
# Training Hyperparameters
# =============================================================================
training:
  batch_size: 32

  learning_rate: 2.0e-6
  num_epochs: 1
  warmup_steps: 2000

  # AdamW hyperparameters.
  # beta2=0.98 (vs default 0.999) is recommended for Transformer training —
  # it gives the second-moment estimate a shorter memory, allowing faster
  # adaptation to changing gradient magnitudes in early training.
  # Adam W hiperparámetros.
  # beta2=0.98 (vs default 0.999) es recomendado para el entrenamiento de Transformers
  # ya que le da a la estimación del segundo momento una memoria más corta
  # permitiendo una adaptación más rápida a las magnitudes de gradiente cambiantes
  # en el entrenamiento temprano.
  beta1: 0.9
  beta2: 0.98
  epsilon: 1.0e-9
  weight_decay: 0.01   # Tasa de decaimiento de peso para AdamW (L2 regularización)

  # Para evitar explosiones de gradiente, 
  # especialmente en las primeras épocas cuando los pesos de atención 
  # están mal calibrados, se recorta la norma global del gradiente 
  # (no por parámetro) a 1.0 para prevenir actualizaciones destructivas 
  # de peso mientras se preserva la dirección del gradiente. 
  max_grad_norm: 1.0

  # Suavizado de etiquetas para la pérdida de entropía cruzada.
  # En lugar de un objetivo one-hot duro [0,0,1,0,...], la distribución objetivo
  # se convierte en [(ε/V), ..., (1 - ε + ε/V), ..., (ε/V)] donde ε=0.1, V=vocab_size.
  # Esto evita que el modelo se vuelva demasiado confiado y mejora el BLEU.
  label_smoothing: 0.1

  # Acumulación de gradientes para simular un tamaño de lote efectivo más grande sin usar más VRAM
  # En 1, cada lote produce una actualización de gradiente inmediatamente (estándar).
  # Configurar esto > 1 simula un tamaño de lote efectivo más grande sin usar más VRAM:
  #   effective_batch = batch_size × gradient_accumulation_steps
  # Si aumentamos manualmente debemos ajustar la lógica del scheduler de LR 
  # y el recorte de gradiente en scripts/train.py.
  gradient_accumulation_steps: 1

# =============================================================================
# Checkpointing
# =============================================================================
checkpointing:
  checkpoint_dir: "models/"
  save_every_n_epochs: 1
  keep_last_n: 3

# =============================================================================
# Logging
# =============================================================================
logging:
  log_dir: "logs/"
  log_every_n_steps: 50
  # Calcula BLEU cada época (no cada 2) para detectar degradación a tiempo.
  compute_bleu_every_n_epochs: 1
